<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Famly Photos">
    <meta name="theme-color" content="#0a0a0f">
    <title>Famly Photos</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #16141f;
            --surface-2: #1e1b2a;
            --surface-3: #2a2639;
            --border: rgba(139, 92, 246, .1);
            --text: #f0ecf9;
            --text-secondary: #9a90b0;
            --text-tertiary: #6b6180;
            --accent: #8b5cf6;
            --accent-dim: #7c4dff;
            --accent-soft: rgba(139, 92, 246, .12);
            --green: #4ade80;
            --red: #f87171;
            --radius: 8px;
            --radius-sm: 4px;
            --nav-height: 52px;
            --grid-gap: 2px;
            --transition-fast: .15s ease;
            --transition-med: .25s ease;
            --transition-slow: .4s cubic-bezier(.25, .1, .25, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: calc(var(--nav-height) + 12px) 0 0 0;
        }

        /* ── Header — frosted glass fixed bar ── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: var(--nav-height);
            background: rgba(22, 20, 31, .78);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .logo .material-icons-outlined {
            font-size: 22px;
            color: var(--accent);
        }
        nav {
            display: flex;
            gap: 2px;
            background: rgba(139, 92, 246, .08);
            border-radius: 8px;
            padding: 3px;
        }
        nav a {
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: .82rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }
        nav a:hover { color: var(--text); }
        nav a.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(139, 92, 246, .3);
        }

        /* ── Filter bar ── */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 4px;
            align-items: center;
            padding: 10px 16px;
        }
        .total-label {
            font-size: .82rem;
            color: var(--text-tertiary);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 400;
        }
        .total-label .material-icons-outlined { font-size: 16px; }
        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            background: rgba(139, 92, 246, .1);
            color: var(--accent);
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-left: auto;
        }
        .upload-btn:hover { background: var(--accent); color: #fff; }
        .upload-btn .material-icons-outlined { font-size: 16px; }
        .upload-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            margin-left: auto;
        }
        .upload-label {
            font-size: .8rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .progress-track {
            flex: 1;
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 2px;
            transition: width .3s ease;
        }

        /* ── Month section headers ── */
        .month-header {
            padding: 28px 16px 10px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            position: sticky;
            top: var(--nav-height);
            z-index: 10;
            background: var(--bg);
        }
        .month-text {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .month-count {
            font-size: .82rem;
            font-weight: 400;
            color: var(--text-tertiary);
        }

        /* ── Photo grid — uniform square thumbnails ── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--grid-gap);
            padding: 0 var(--grid-gap);
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer;
            transition: transform var(--transition-fast), filter var(--transition-fast);
        }
        .gallery-item:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            z-index: 2;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Video in grid */
        .gallery-item .video-wrap {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .gallery-item .video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-item .video-wrap .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 40px;
            height: 40px;
            background: rgba(139, 92, 246, .85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(139, 92, 246, .4);
            transition: transform var(--transition-fast), opacity var(--transition-fast);
        }
        .gallery-item:hover .play-btn { transform: translate(-50%, -50%) scale(1.08); }
        .play-btn .material-icons-outlined { font-size: 22px; color: #fff; margin-left: 2px; }

        /* Video duration badge */
        .gallery-item .video-badge {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: .68rem;
            font-weight: 500;
            color: #fff;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .video-badge .material-icons-outlined { font-size: 12px; }

        /* ── Infinite scroll loading ── */
        .load-sentinel { height: 1px; }
        .load-spinner {
            display: flex;
            justify-content: center;
            padding: 32px 0;
        }
        .load-spinner .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, .1);
            border-top-color: rgba(255, 255, 255, .5);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .end-marker {
            text-align: center;
            padding: 32px 0 16px;
            color: var(--text-tertiary);
            font-size: .82rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .end-marker .material-icons-outlined { font-size: 16px; }

        /* ── Lightbox — full-bleed media-first ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, .92);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            opacity: 0;
            transition: opacity var(--transition-slow);
        }
        .lightbox.open { display: flex; }
        .lightbox.visible { opacity: 1; }

        .lightbox-inner {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }
        .lightbox-media {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 60px 80px;
            transition: padding var(--transition-med);
        }
        .lightbox-media img, .lightbox-media video {
            max-width: 100%;
            max-height: calc(100vh - 120px);
            border-radius: 6px;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
        }
        .lightbox-media video { background: #000; }

        /* Lightbox sidebar — hidden by default, slides in */
        .lightbox-sidebar {
            width: 320px;
            min-width: 280px;
            background: rgba(22, 20, 31, .88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            height: 100vh;
            overflow-y: auto;
            padding: 28px 20px;
            flex-shrink: 0;
            transform: translateX(100%);
            transition: transform var(--transition-med);
            position: absolute;
            right: 0;
            top: 0;
        }
        .lightbox-sidebar.open {
            transform: translateX(0);
        }
        .lightbox-sidebar .lb-source {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: .7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 16px;
        }
        .lightbox-sidebar .lb-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
            color: var(--text);
        }
        .lightbox-sidebar .lb-body {
            font-size: .88rem;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
        .lightbox-sidebar .lb-meta {
            font-size: .78rem;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lb-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lb-meta-row .material-icons-outlined { font-size: 16px; color: var(--text-tertiary); }

        /* Lightbox controls — frosted glass, auto-hide */
        .lb-controls {
            position: fixed;
            inset: 0;
            z-index: 1001;
            pointer-events: none;
            opacity: 1;
            transition: opacity .3s ease;
        }
        .lb-controls.hidden { opacity: 0; }
        .lb-controls .lb-btn { pointer-events: auto; }

        .lb-btn {
            position: fixed;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(139, 92, 246, .15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, .85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .lb-btn:hover { background: rgba(139, 92, 246, .3); transform: scale(1.05); }
        .lb-btn .material-icons-outlined { font-size: 20px; }
        .lb-close { top: 16px; left: 16px; }
        .lb-prev  { top: 50%; left: 16px; transform: translateY(-50%); }
        .lb-next  { top: 50%; right: 16px; transform: translateY(-50%); }
        .lb-info  { top: 16px; right: 16px; }
        .lb-prev:hover { transform: translateY(-50%) scale(1.05); }
        .lb-next:hover { transform: translateY(-50%) scale(1.05); }

        /* When sidebar is open, shift right-side buttons */
        .lightbox.sidebar-open .lb-next { right: 336px; }
        .lightbox.sidebar-open .lb-info { right: 336px; }
        .lightbox.sidebar-open .lightbox-media { padding-right: 340px; }

        /* Photo counter */
        .lb-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            font-size: .78rem;
            font-weight: 500;
            color: rgba(255, 255, 255, .5);
            background: rgba(10, 10, 15, .5);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 12px;
            pointer-events: none;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 120px 20px;
            color: var(--text-tertiary);
        }
        .empty-state .material-icons-outlined {
            font-size: 48px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            display: block;
        }
        .empty-state p { font-size: .92rem; }
        .empty-state a { color: var(--accent); text-decoration: none; }
        .empty-state a:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            header { padding: 0 14px; }
            .logo { font-size: .95rem; }
            .logo .material-icons-outlined { font-size: 20px; }
            .month-text { font-size: 1.15rem; }
            .month-header { padding: 22px 12px 8px; }
            .lightbox-media { padding: 40px 60px; }
        }
        @media (max-width: 600px) {
            .container { padding-top: calc(var(--nav-height) + 4px); }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 1px;
                padding: 0 1px;
            }
            .gallery-item { border-radius: 2px; }
            .month-text { font-size: 1.05rem; }
            .month-header { padding: 18px 10px 6px; }
            .filters { padding: 8px 10px; }
            .lightbox-inner { flex-direction: column; }
            .lightbox-media {
                padding: 16px;
                max-height: 60vh;
                flex: none;
                height: auto;
            }
            .lightbox-media img, .lightbox-media video {
                max-height: 55vh;
            }
            .lightbox-sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                width: 100%;
                height: auto;
                max-height: 50vh;
                min-width: unset;
                border-left: none;
                border-top: 1px solid var(--border);
                border-radius: 14px 14px 0 0;
                transform: translateY(100%);
                transition: transform var(--transition-med);
            }
            .lightbox-sidebar.open { transform: translateY(0); }
            .lightbox.sidebar-open .lb-next { right: 16px; }
            .lightbox.sidebar-open .lb-info { right: 16px; }
            .lightbox.sidebar-open .lightbox-media { padding-right: 16px; }
            .lb-close { top: 10px; left: 10px; }
            .lb-info { top: 10px; right: 10px; }
            .lb-prev, .lb-next { display: none; }
            .lb-counter { bottom: 12px; }
            nav a { padding: 5px 10px; font-size: .78rem; }
        }
        @media (max-width: 380px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }
        /* ── Pull-to-refresh ── */
        .ptr-indicator {
            position: fixed;
            top: var(--nav-height); left: 0; right: 0;
            z-index: 99;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 48px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .2s ease;
        }
        .ptr-indicator.pulling, .ptr-indicator.refreshing { opacity: 1; }
        .ptr-spinner {
            width: 24px; height: 24px;
            border: 2.5px solid rgba(139, 92, 246, .2);
            border-top-color: var(--accent);
            border-radius: 50%;
        }
        .ptr-indicator.refreshing .ptr-spinner {
            animation: spin .7s linear infinite;
        }
        body.ptr-active {
            transition: transform .3s cubic-bezier(.25, .1, .25, 1);
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="/">
            <img src="/logo.png" alt="" width="32" height="32" style="border-radius:4px">
            Famly Photos
        </a>
        <nav>
            <a href="/" class="active">Photos</a>
            <a href="/journey">Journey</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
    </header>
    <div class="ptr-indicator" id="ptr-indicator"><div class="ptr-spinner"></div></div>

    <div class="container">
        <div class="filters">
            <span class="total-label">
                <span class="material-icons-outlined">collections</span>
                {{ total }} photos
            </span>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                <span class="material-icons-outlined">upload</span>
                Upload
            </button>
            <input type="file" id="file-input" multiple accept="image/*,video/*" hidden>
            <div class="upload-progress" id="upload-progress" style="display:none;">
                <span class="upload-label" id="upload-label">Uploading...</span>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        {% if items %}
        <div id="gallery-container"></div>

        <div class="load-sentinel" id="load-sentinel"></div>
        <div class="load-spinner" id="load-spinner" style="display:none;">
            <div class="spinner"></div>
        </div>
        <div class="end-marker" id="end-marker" style="display:none;">
            <span class="material-icons-outlined">check_circle</span>
            All photos loaded
        </div>

        {% else %}
        <div class="empty-state">
            <span class="material-icons-outlined">photo_library</span>
            <p>No photos yet. Trigger a fetch from the <a href="/dashboard">Dashboard</a>.</p>
        </div>
        {% endif %}
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lb-controls" id="lb-controls">
            <button class="lb-btn lb-close" onclick="closeLightbox()">
                <span class="material-icons-outlined">close</span>
            </button>
            <button class="lb-btn lb-prev" onclick="navLightbox(-1)">
                <span class="material-icons-outlined">chevron_left</span>
            </button>
            <button class="lb-btn lb-next" onclick="navLightbox(1)">
                <span class="material-icons-outlined">chevron_right</span>
            </button>
            <button class="lb-btn lb-info" onclick="toggleSidebar()">
                <span class="material-icons-outlined">info</span>
            </button>
        </div>
        <div class="lb-counter" id="lb-counter"></div>
        <div class="lightbox-inner" id="lightbox-inner">
            <div class="lightbox-media" id="lb-media"></div>
            <div class="lightbox-sidebar" id="lb-sidebar">
                <div class="lb-source" id="lb-source"></div>
                <div class="lb-title" id="lb-title"></div>
                <div class="lb-body" id="lb-body"></div>
                <div class="lb-meta" id="lb-meta"></div>
            </div>
        </div>
    </div>

    <script>
        // ── Pull-to-refresh ──
        (function() {
            var PTR_THRESHOLD = 80, PTR_MAX = 140;
            var indicator = document.getElementById('ptr-indicator');
            if (!indicator) return;
            var startY = 0, pulling = false, refreshing = false, currentDy = 0;
            function isAtTop() { return window.scrollY <= 0; }
            function isLightboxOpen() {
                var lb = document.getElementById('lightbox');
                return lb && lb.classList.contains('open');
            }
            function setTranslate(px) {
                var t = 'translateY(' + px + 'px)';
                document.body.style.transform = t;
                indicator.style.transform = t;
            }
            document.addEventListener('touchstart', function(e) {
                if (refreshing || !isAtTop() || isLightboxOpen() || e.touches.length !== 1) return;
                startY = e.touches[0].clientY;
                pulling = false;
                currentDy = 0;
                document.body.classList.remove('ptr-active');
            }, { passive: true });
            document.addEventListener('touchmove', function(e) {
                if (refreshing || !isAtTop() || isLightboxOpen() || e.touches.length !== 1) return;
                var dy = e.touches[0].clientY - startY;
                if (dy < 0) { if (pulling) reset(); return; }
                if (!pulling && dy < 10) return;
                pulling = true;
                currentDy = dy;
                var pull = Math.min(dy * 0.45, PTR_MAX);
                setTranslate(pull);
                indicator.classList.add('pulling');
                var spinner = indicator.querySelector('.ptr-spinner');
                if (spinner) {
                    var progress = Math.min(dy / PTR_THRESHOLD, 1);
                    spinner.style.transform = 'rotate(' + (progress * 360) + 'deg)';
                }
                if (dy > 10 && isAtTop()) e.preventDefault();
            }, { passive: false });
            document.addEventListener('touchend', function() {
                if (!pulling || refreshing) return;
                if (currentDy >= PTR_THRESHOLD) {
                    refreshing = true;
                    document.body.classList.add('ptr-active');
                    setTranslate(56);
                    indicator.classList.remove('pulling');
                    indicator.classList.add('refreshing');
                    var spinner = indicator.querySelector('.ptr-spinner');
                    if (spinner) spinner.style.transform = '';
                    setTimeout(function() { location.reload(); }, 600);
                } else {
                    document.body.classList.add('ptr-active');
                    reset();
                }
            }, { passive: true });
            function reset() {
                pulling = false;
                currentDy = 0;
                setTranslate(0);
                indicator.classList.remove('pulling');
                var spinner = indicator.querySelector('.ptr-spinner');
                if (spinner) spinner.style.transform = '';
                setTimeout(function() { document.body.classList.remove('ptr-active'); }, 300);
            }
        })();

        const VIDEO_EXTS = ['mp4','mov','webm','m4v'];
        const MONTH_NAMES = ['January','February','March','April','May','June',
                             'July','August','September','October','November','December'];
        const currentSource = 'tagged';

        // All loaded items (grows with infinite scroll)
        let allItems = {{ items | tojson }};
        let offset = allItems.length;
        let hasMore = {{ 'true' if has_more else 'false' }};
        let loading = false;
        let currentIdx = 0;
        let sidebarOpen = false;

        // ── Render helpers ──
        function isVideo(filename) {
            return VIDEO_EXTS.includes(filename.split('.').pop().toLowerCase());
        }

        function monthKey(dateStr) {
            if (!dateStr || dateStr.length < 7) return 'Unknown';
            const [y, m] = dateStr.split('-');
            const mi = parseInt(m, 10);
            if (isNaN(mi) || mi < 1 || mi > 12) return dateStr.slice(0, 7);
            return MONTH_NAMES[mi - 1] + ' ' + y;
        }

        function isExternalVideo(item) {
            return item.filename.startsWith('__video__') && item.video_url;
        }

        function renderItemHTML(item, globalIdx) {
            const ext = item.filename.split('.').pop().toLowerCase();
            const vid = VIDEO_EXTS.includes(ext) || isExternalVideo(item);
            let media;
            if (isExternalVideo(item)) {
                media = `<div class="video-wrap">
                    <video src="${item.video_url}" preload="metadata" playsinline muted crossorigin="anonymous"></video>
                    <div class="play-btn"><span class="material-icons-outlined">play_arrow</span></div>
                </div>`;
            } else if (vid) {
                media = `<div class="video-wrap">
                    <video src="/photos/${item.filename}" preload="metadata" playsinline muted></video>
                    <div class="play-btn"><span class="material-icons-outlined">play_arrow</span></div>
                </div>`;
            } else {
                media = `<img src="/photos/${item.filename}" loading="lazy" alt="">`;
            }

            return `<div class="gallery-item" onclick="openLightbox(${globalIdx})" data-idx="${globalIdx}">${media}</div>`;
        }

        // ── Pre-compute month counts ──
        function getMonthCounts(items) {
            const counts = {};
            items.forEach(item => {
                const mk = monthKey(item.content_date);
                counts[mk] = (counts[mk] || 0) + 1;
            });
            return counts;
        }

        // ── Build the gallery with month groups ──
        const container = document.getElementById('gallery-container');
        let lastMonth = '';
        let currentGrid = null;
        let monthHeaders = {};

        function ensureMonthSection(mk, count) {
            if (mk === lastMonth && currentGrid) return;
            lastMonth = mk;
            const header = document.createElement('div');
            header.className = 'month-header';
            header.setAttribute('data-month', mk);
            header.innerHTML = `<span class="month-text">${mk}</span><span class="month-count">${count || ''}</span>`;
            container.appendChild(header);
            monthHeaders[mk] = header;
            currentGrid = document.createElement('div');
            currentGrid.className = 'gallery-grid';
            container.appendChild(currentGrid);
        }

        function updateMonthCount(mk, count) {
            const header = monthHeaders[mk];
            if (header) {
                const countEl = header.querySelector('.month-count');
                if (countEl) countEl.textContent = count;
            }
        }

        function appendItems(items, startIdx) {
            const counts = getMonthCounts(allItems);
            items.forEach((item, i) => {
                const mk = monthKey(item.content_date);
                ensureMonthSection(mk, counts[mk]);
                updateMonthCount(mk, counts[mk]);
                currentGrid.insertAdjacentHTML('beforeend', renderItemHTML(item, startIdx + i));
            });
        }

        // Initial render
        if (allItems.length > 0) {
            appendItems(allItems, 0);
        }

        // ── Infinite scroll ──
        const sentinel = document.getElementById('load-sentinel');
        const spinner = document.getElementById('load-spinner');
        const endMarker = document.getElementById('end-marker');

        if (sentinel && hasMore) {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && hasMore && !loading) {
                    loadMore();
                }
            }, { rootMargin: '400px' });
            observer.observe(sentinel);
        }

        async function loadMore() {
            if (loading || !hasMore) return;
            loading = true;
            spinner.style.display = 'flex';

            const params = new URLSearchParams({ offset: offset, limit: 40 });
            if (currentSource) params.set('source', currentSource);

            try {
                const resp = await fetch('/api/gallery-page?' + params);
                const data = await resp.json();
                if (data.items.length > 0) {
                    const startIdx = allItems.length;
                    allItems = allItems.concat(data.items);
                    appendItems(data.items, startIdx);
                    offset += data.items.length;
                }
                hasMore = data.has_more;
                if (!hasMore && endMarker) {
                    endMarker.style.display = 'flex';
                }
            } catch (e) {
                console.error('Load more failed:', e);
            } finally {
                loading = false;
                spinner.style.display = 'none';
            }
        }

        // ── Lightbox ──
        let controlsTimer;
        const controlsEl = document.getElementById('lb-controls');
        const lightboxEl = document.getElementById('lightbox');

        function showControls() {
            controlsEl.classList.remove('hidden');
            clearTimeout(controlsTimer);
            controlsTimer = setTimeout(() => controlsEl.classList.add('hidden'), 2500);
        }

        lightboxEl.addEventListener('mousemove', showControls);
        lightboxEl.addEventListener('touchstart', showControls, { passive: true });

        function openLightbox(idx) {
            currentIdx = idx;
            renderLightbox();
            lightboxEl.classList.add('open');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => lightboxEl.classList.add('visible'));
            });
            document.body.style.overflow = 'hidden';
            showControls();
        }

        function closeLightbox() {
            const vid = document.querySelector('#lb-media video');
            if (vid) vid.pause();
            lightboxEl.classList.remove('visible');
            setTimeout(() => {
                lightboxEl.classList.remove('open', 'sidebar-open');
                lightboxEl.style.display = '';
                document.getElementById('lb-sidebar').classList.remove('open');
                sidebarOpen = false;
            }, 400);
            document.body.style.overflow = '';
            clearTimeout(controlsTimer);
        }

        function navLightbox(dir) {
            const vid = document.querySelector('#lb-media video');
            if (vid) vid.pause();
            currentIdx = Math.max(0, Math.min(allItems.length - 1, currentIdx + dir));
            renderLightbox();
        }

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            document.getElementById('lb-sidebar').classList.toggle('open', sidebarOpen);
            lightboxEl.classList.toggle('sidebar-open', sidebarOpen);
        }

        function renderLightbox() {
            const item = allItems[currentIdx];
            const extVid = isExternalVideo(item);
            const vid = isVideo(item.filename) || extVid;
            const mediaEl = document.getElementById('lb-media');
            const videoSrc = extVid ? item.video_url : `/photos/${item.filename}`;

            if (vid) {
                mediaEl.innerHTML = `<video src="${videoSrc}" controls playsinline preload="auto"
                    ${extVid ? 'crossorigin="anonymous"' : ''} autoplay></video>`;
            } else {
                mediaEl.innerHTML = `<img src="/photos/${item.filename}" alt="">`;
            }

            document.getElementById('lb-source').textContent = item.source;
            document.getElementById('lb-title').textContent = item.title || '';
            document.getElementById('lb-body').textContent = item.body || '';
            document.getElementById('lb-counter').textContent = `${currentIdx + 1} / ${allItems.length}`;
            document.getElementById('lb-meta').innerHTML = `
                <div class="lb-meta-row">
                    <span class="material-icons-outlined">calendar_today</span>
                    ${item.content_date || 'Unknown date'}
                </div>
                ${item.author ? `<div class="lb-meta-row"><span class="material-icons-outlined">person</span>${item.author}</div>` : ''}
                <div class="lb-meta-row">
                    <span class="material-icons-outlined">folder</span>
                    ${item.filename}
                </div>
            `;
        }

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (!lightboxEl.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
            if (e.key === 'i' || e.key === 'I') toggleSidebar();
        });

        // Touch swipe for lightbox on mobile
        let touchStartX = 0;
        let touchStartY = 0;
        const lightboxInner = document.getElementById('lightbox-inner');
        if (lightboxInner) {
            lightboxInner.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });
            lightboxInner.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].screenX - touchStartX;
                const dy = e.changedTouches[0].screenY - touchStartY;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx > 0) navLightbox(-1);
                    else navLightbox(1);
                }
            }, { passive: true });
        }

        // ── Upload handler with progress bar ──
        document.getElementById('file-input').addEventListener('change', function() {
            const files = this.files;
            if (!files.length) return;

            const progress = document.getElementById('upload-progress');
            const label = document.getElementById('upload-label');
            const fill = document.getElementById('progress-fill');
            const btn = document.querySelector('.upload-btn');

            btn.style.display = 'none';
            progress.style.display = 'flex';
            label.textContent = `Uploading ${files.length} file(s)...`;
            fill.style.width = '0%';

            const formData = new FormData();
            for (const f of files) formData.append('files', f);

            const xhr = new XMLHttpRequest();
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    fill.style.width = pct + '%';
                    label.textContent = `Uploading ${files.length} file(s)... ${pct}%`;
                }
            });
            xhr.addEventListener('load', () => {
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (data.uploaded > 0) {
                        fill.style.width = '100%';
                        label.textContent = `${data.uploaded} uploaded!`;
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        label.textContent = data.errors.join(', ') || 'No files uploaded';
                        setTimeout(() => { progress.style.display = 'none'; btn.style.display = 'inline-flex'; }, 3000);
                    }
                } catch (e) {
                    label.textContent = 'Upload failed';
                    setTimeout(() => { progress.style.display = 'none'; btn.style.display = 'inline-flex'; }, 3000);
                }
            });
            xhr.addEventListener('error', () => {
                label.textContent = 'Upload failed';
                setTimeout(() => { progress.style.display = 'none'; btn.style.display = 'inline-flex'; }, 3000);
            });
            xhr.open('POST', '/api/upload');
            xhr.send(formData);
            this.value = '';
        });
    </script>
</body>
</html>
